{% extends 'layout.html' %}

{% block body %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card-agri p-5 border-0 shadow-sm" style="background: white; border-radius: 16px;">
        <div class="text-center mb-4">
          <div
            style="background: rgba(14, 165, 233, 0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto; border: 1px solid rgba(14, 165, 233, 0.2);">
            <i class="fa-solid fa-list-check" style="font-size: 32px; color: #0EA5E9;"></i>
          </div>
          <h2 class="fw-bold text-dark mb-2" style="font-size: 24px;">Prescription Generated</h2>
          <p class="text-muted small text-uppercase fw-bold letter-spacing-1">Fertilization Strategy</p>
        </div>

        <div class="p-4 mb-5"
          style="background: var(--agri-bg); border-radius: 12px; border: 1px solid var(--agri-border); border-left: 4px solid #0EA5E9;">
          <span style="font-size: 18px; line-height: 1.8; color: var(--agri-text-main); font-family: var(--font-body);">
            {{ recommendation|safe }}
          </span>
        </div>

        <div class="d-flex justify-content-center gap-3">
          <a href="{{ url_for('fertilizer_recommendation') }}" class="btn-agri px-4 py-2"
            style="background: #0EA5E9; color: white;">
            <i class="fas fa-redo me-2"></i> Try Another Analysis
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
