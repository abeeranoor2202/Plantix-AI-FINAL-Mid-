{% extends 'layout.html' %}

{% block body %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card-agri p-5 border-0 shadow-sm" style="background: white; border-radius: 16px;">
        <div class="text-center mb-5">
          <div
            style="background: rgba(14, 165, 233, 0.1); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto; border: 1px solid rgba(14, 165, 233, 0.2);">
            <i class="fa-solid fa-flask" style="font-size: 28px; color: #0EA5E9;"></i>
          </div>
          <h2 class="fw-bold mb-2 text-dark" style="font-size: 28px;">Fertilizer Analysis</h2>
          <p class="text-muted" style="font-size: 16px;">Enter your soil profile and intended crop to receive customized
            fertilizer directives.</p>
        </div>

        <form method="POST" action="{{ url_for('fert_recommend') }}">
          <div class="row g-4">
            <div class="col-md-4">
              <label for="Nitrogen" class="form-label fw-bold text-dark small mb-2">Nitrogen (N)</label>
              <input type="number" step="0.01" class="form-agri w-100" id="Nitrogen" name="nitrogen"
                placeholder="e.g. 50" required />
            </div>

            <div class="col-md-4">
              <label for="Phosphorous" class="form-label fw-bold text-dark small mb-2">Phosphorous (P)</label>
              <input type="number" step="0.01" class="form-agri w-100" id="Phosphorous" name="phosphorous"
                placeholder="e.g. 50" required />
            </div>

            <div class="col-md-4">
              <label for="Pottasium" class="form-label fw-bold text-dark small mb-2">Potassium (K)</label>
              <input type="number" step="0.01" class="form-agri w-100" id="Pottasium" name="pottasium"
                placeholder="e.g. 50" required />
            </div>

            <div class="col-12">
              <label for="crop" class="form-label fw-bold text-dark small mb-2">Intended Crop to Cultivate</label>
              <select name="cropname" id="crop" class="form-agri w-100 bg-white" required>
                <option value="" disabled selected>Select crop...</option>
                <option value="rice">Rice</option>
                <option value="maize">Maize</option>
                <option value="chickpea">Chickpea</option>
                <option value="kidneybeans">Kidney Beans</option>
                <option value="pigeonpeas">Pigeon Peas</option>
                <option value="mothbeans">Moth Beans</option>
                <option value="mungbean">Mung Bean</option>
                <option value="blackgram">Black Gram</option>
                <option value="lentil">Lentil</option>
                <option value="pomegranate">Pomegranate</option>
                <option value="banana">Banana</option>
                <option value="mango">Mango</option>
                <option value="grapes">Grapes</option>
                <option value="watermelon">Watermelon</option>
                <option value="muskmelon">Muskmelon</option>
                <option value="apple">Apple</option>
                <option value="orange">Orange</option>
                <option value="papaya">Papaya</option>
                <option value="coconut">Coconut</option>
                <option value="cotton">Cotton</option>
                <option value="jute">Jute</option>
                <option value="coffee">Coffee</option>
              </select>
            </div>
          </div>

          <div class="mt-5 text-center">
            <button type="submit" class="btn-agri w-100 py-3"
              style="font-size: 18px; letter-spacing: 0.5px; background: #0EA5E9; color: white; border: none; box-shadow: 0 4px 6px rgba(14, 165, 233, 0.25);">
              <i class="fas fa-flask me-2"></i> Predict Fertilizer Requirement
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
