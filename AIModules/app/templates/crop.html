{% extends 'layout.html' %}

{% block body %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card-agri p-5 border-0 shadow-sm" style="background: white; border-radius: 16px;">
        <div class="text-center mb-5">
          <div
            style="background: var(--agri-primary-light); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
            <i class="fa-solid fa-wheat-awn" style="font-size: 28px; color: var(--agri-primary-dark);"></i>
          </div>
          <h2 class="fw-bold mb-2 text-dark" style="font-size: 28px;">Crop Recommendation</h2>
          <p class="text-muted" style="font-size: 16px;">Input your soil metrics to determine the most optimal crop to
            cultivate.</p>
        </div>

        <form method="POST" action="{{ url_for('crop_prediction') }}">
          <div class="row g-4">
            <div class="col-md-4">
              <label for="Nitrogen" class="form-label fw-bold text-dark small mb-2">Nitrogen (N)</label>
              <input type="number" step="any" class="form-agri w-100" id="Nitrogen" name="nitrogen"
                placeholder="e.g. 50" required />
            </div>

            <div class="col-md-4">
              <label for="Phosphorous" class="form-label fw-bold text-dark small mb-2">Phosphorous (P)</label>
              <input type="number" step="any" class="form-agri w-100" id="Phosphorous" name="phosphorous"
                placeholder="e.g. 50" required />
            </div>

            <div class="col-md-4">
              <label for="Pottasium" class="form-label fw-bold text-dark small mb-2">Potassium (K)</label>
              <input type="number" step="any" class="form-agri w-100" id="Pottasium" name="pottasium"
                placeholder="e.g. 50" required />
            </div>

            <div class="col-md-4">
              <label for="ph" class="form-label fw-bold text-dark small mb-2">Soil pH Level</label>
              <input type="number" step="any" class="form-agri w-100" id="ph" name="ph" placeholder="e.g. 6.5"
                required />
            </div>

            <div class="col-md-4">
              <label for="Rainfall" class="form-label fw-bold text-dark small mb-2">Rainfall (mm)</label>
              <input type="number" step="any" class="form-agri w-100" id="Rainfall" name="rainfall"
                placeholder="e.g. 200" required />
            </div>

            <div class="col-md-4">
              <label for="Temperature" class="form-label fw-bold text-dark small mb-2">Temperature (&deg;C)</label>
              <input type="number" step="any" class="form-agri w-100" id="Temperature" name="temperature"
                placeholder="e.g. 25" required />
            </div>

            <div class="col-md-4">
              <label for="Humidity" class="form-label fw-bold text-dark small mb-2">Humidity (%)</label>
              <input type="number" step="any" class="form-agri w-100" id="Humidity" name="humidity"
                placeholder="e.g. 70" required />
            </div>
          </div>

          <div class="mt-5 text-center">
            <button type="submit" class="btn-agri btn-agri-primary w-100 py-3"
              style="font-size: 18px; letter-spacing: 0.5px;">
              <i class="fas fa-chart-line me-2"></i> Predict Best Crop
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>



{% endblock %}
